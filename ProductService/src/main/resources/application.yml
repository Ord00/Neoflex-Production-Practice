spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    url: jdbc:postgresql://${PRODUCTS_SERVICE:localhost}:5432/${PRODUCTS_DB}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/changelog-master.xml

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: reserve-product-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
    properties:
      spring:
        json:
          trusted:
            packages: "neoflex.prod.practice.dto"

kafka:
  topics:
    reserve:
      product: reserve-product

server:
  port: 8082
  url: "http://localhost:${server.port}"

management:
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://${JAEGER_SERVICE:localhost}:4317

otel:
  resource:
    attributes:
      service.name: ProductService
  traces:
    exporter: otlp
  metrics:
    exporter: otlp
  logs:
    exporter: none
  exporter:
    otlp:
      endpoint: http://${JAEGER_SERVICE:jaeger}:4318