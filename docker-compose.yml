services:
  orders-service:
    build:
      context: .
      dockerfile: OrdersService/Dockerfile
    environment:
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      ORDERS_SERVICE: orders-db
      ORDERS_DB: ${ORDERS_DB}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAEGER_SERVICE: jaeger
      SCHEMA_REGISTRY_SERVICE: schema-registry
    depends_on:
      orders-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - app-network
      - orders-network

  products-service:
    build:
      context: .
      dockerfile: ProductService/Dockerfile
    environment:
      PG_USER: ${PG_USER}
      PG_PASSWORD: ${PG_PASSWORD}
      PRODUCTS_SERVICE: products-db
      PRODUCTS_DB: ${PRODUCTS_DB}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAEGER_SERVICE: jaeger
      SCHEMA_REGISTRY_SERVICE: schema-registry
    depends_on:
      products-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8083:8083"
    networks:
      - app-network
      - products-network

  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker, controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 0" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  kafka-ui:
    image: rootpublic/kafka-ui:0.7.2
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_SCHEMAREGISTRY: http://schema-registry:8081
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - app-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.7.8
    container_name: schema-registry
    ports:
      - "8081:8081"
    environment:
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    depends_on:
      - kafka
    networks:
      - app-network

  orders-db:
    image: postgres:14
    container_name: orders-db
    environment:
      POSTGRES_DB: ${ORDERS_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - orders-data:/var/lib/postgresql/data
    networks:
      - orders-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${ORDERS_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  orders-ui:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      orders-db:
        condition: service_healthy
    networks:
      - orders-network

  products-db:
    image: postgres:14
    container_name: products-db
    environment:
      POSTGRES_DB: ${PRODUCTS_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5434:5432"
    volumes:
      - products-data:/var/lib/postgresql/data
    networks:
      - products-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PRODUCTS_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  products-ui:
    image: dpage/pgadmin4
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
    depends_on:
      products-db:
        condition: service_healthy
    networks:
      - products-network

  jaeger:
    image: jaegertracing/all-in-one:1.75.0
    ports:
      - "16686:16686"
      - "4317:4317"
      - "4318:4318"
    environment:
      COLLECTOR_OTLP_ENABLED: true
    networks:
      - app-network

volumes:
  orders-data:
    driver: local
  products-data:
    driver: local
  kafka_data:
    driver: local

networks:
  app-network:
    driver: bridge
  orders-network:
    driver: bridge
  products-network:
    driver: bridge