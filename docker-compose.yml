services:
  orders-service:
    build:
      context: .
      dockerfile: OrdersService/Dockerfile
    environment:
      SPRING_DATASOURCE_USERNAME: ${PG_USER}
      SPRING_DATASOURCE_PASSWORD: ${PG_PASSWORD}
      PG_SERVICE: orders-db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://orders-db:5432/${ORDERS_DB}
    depends_on:
      orders-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8081:8081"
    networks:
      - app-network

  products-service:
    build:
      context: .
      dockerfile: ProductService/Dockerfile
    environment:
      SPRING_DATASOURCE_USERNAME: ${PG_USER}
      SPRING_DATASOURCE_PASSWORD: ${PG_PASSWORD}
      PG_SERVICE: products-db
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_URL: jdbc:postgresql://products-db:5432/${PRODUCTS_DB}
    depends_on:
      products-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
    ports:
      - "8082:8082"
    networks:
      - app-network

  kafka:
    image: apache/kafka:4.0.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      CLUSTER_ID: ${KAFKA_CLUSTER_ID}
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafka_data:/var/lib/kafka/data
    user: "root"
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 0" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  kafka-ui:
    image: rootpublic/kafka-ui:0.7.2
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092

  orders-db:
    image: postgres:14
    container_name: orders-db
    environment:
      POSTGRES_DB: ${ORDERS_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${ORDERS_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  orders-ui:
    image: dpage/pgadmin4
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PG_USER}
      PGADMIN_DEFAULT_PASSWORD: ${PG_PASSWORD}
    depends_on:
      orders-db:
        condition: service_healthy

  products-db:
    image: postgres:14
    container_name: products-db
    environment:
      POSTGRES_DB: ${PRODUCTS_DB}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - ./postgres/data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PRODUCTS_DB}" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  products-ui:
    image: dpage/pgadmin4
    ports:
      - "5051:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PG_USER}
      PGADMIN_DEFAULT_PASSWORD: ${PG_PASSWORD}
    depends_on:
      products-db:
        condition: service_healthy

  jaeger:
    image: jaegertracing/all-in-one:2.17.0
    ports:
      - "16686:16686"
      - "4317:4317"
    environment:
      COLLECTOR_OTLP_ENABLED: true

volumes:
  kafka_data:
    driver: local

networks:
  app-network:
    driver: bridge